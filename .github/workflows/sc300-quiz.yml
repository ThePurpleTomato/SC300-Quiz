name: SC-300 push quiz

on:
  schedule:
    # Every 15 min across 00:00-07:30 UTC == 08:00-15:30 Perth (AWST, UTC+8, no DST).
    # The script decides, once per day, the 5 random times to actually push; every
    # other run exits in ~1s. Runs all 7 days (use "1-5" for Mon-Fri only).
    - cron: "0,15,30,45 0-6 * * *"
    - cron: "0,15,30 7 * * *"
  workflow_dispatch:
    inputs:
      test_slot:
        description: "Send a test question now from this slot (0-4)"
        required: false
        default: "0"

# Serialize runs so two near-simultaneous crons don't race on cache state.
concurrency:
  group: sc300-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute cache keys
        id: keys
        run: |
          DATE=$(date -u +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "save_key=quiz-state-$DATE-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      # Restore the newest state.json saved for today. A new day misses the prefix
      # entirely -> nothing restored -> script resets fired[] (daily reset).
      - name: Restore quiz state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: ${{ steps.keys.outputs.save_key }}
          restore-keys: |
            quiz-state-${{ steps.keys.outputs.date }}-

      - name: Run the quiz check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # On manual runs only, force an immediate test push from the chosen slot.
          FORCE_SLOT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_slot || '' }}
        run: python3 send_question.py

      - name: Save quiz state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: ${{ steps.keys.outputs.save_key }}
